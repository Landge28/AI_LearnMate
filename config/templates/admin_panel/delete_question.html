{% extends "admin_panel/base.html" %}

{% block content %}

<div class="card-box">

<h2 class="text-danger">

Delete Question

</h2>

<hr>

<p>

Are you sure you want to delete this question?

</p>

<p>

<strong>

{{ question.question_text }}

</strong>

</p>

<form method="POST">

{% csrf_token %}

<button class="btn btn-danger">

Delete

</button>

<a
href="{% url 'admin_questions' question.quiz.id %}"
class="btn btn-secondary">

Cancel

</a>

</form>

</div>

{% endblock %}
