

{% extends "accounts/dashboard_base.html" %}

{% block content %}

<div class="container-fluid">

    <div class="widget-card">

    <div class="d-flex justify-content-between align-items-center">

        <div>

            <h2>

                🤖 AI Tutor

            </h2>

            <p>

                Ask anything about Python, Django,
                Cyber Security or Artificial Intelligence.

            </p>

        </div>

        <button
            class="btn btn-danger"
            onclick="clearChat()">

            🗑 Clear Chat

        </button>

    </div>

</div>

    <div class="widget-card mt-4">

        <div id="chatBox" class="chat-box"></div>
        <div class="suggested-questions mb-4">

    <button
        class="btn btn-outline-primary suggestion">

        What is Python?

    </button>

    <button
        class="btn btn-outline-primary suggestion">

        Explain Django ORM

    </button>

    <button
        class="btn btn-outline-primary suggestion">

        What is REST API?

    </button>

    <button
        class="btn btn-outline-primary suggestion">

        SQL Injection

    </button>

</div>

        <div class="mt-3 d-flex">

            <input
                id="message"
                class="form-control"
                placeholder="Ask AI Tutor...">

           <button

                id="sendBtn"

                class="btn btn-primary ms-3"

                onclick="sendMessage()">

               Send

            </button>

        </div>

    </div>

</div>

<script>

async function loadHistory() {

    const chatBox = document.getElementById("chatBox");

    try{

        const response = await fetch("/api/chat-history/",{

            headers:{

                "X-CSRFToken":"{{ csrf_token }}"

            }

        });

        const history = await response.json();

        chatBox.innerHTML="";

        if(!Array.isArray(history)){

            chatBox.innerHTML = `

            <div class="ai-message">

                <strong>🤖 AI Tutor</strong>

                <br><br>

                👋 Hello {{ request.user.first_name|default:request.user.username }}!

                <br><br>

                I'm your AI Tutor.

                <br><br>

                Ask me anything about:

                <ul>

                    <li>Python</li>

                    <li>Django</li>

                    <li>REST API</li>

                    <li>Cyber Security</li>

                    <li>Machine Learning</li>

                </ul>

            </div>

            `;

            return;

        }

        history.forEach(chat=>{

            if(chat.role==="user"){

                chatBox.innerHTML += `

                <div class="user-message">

                    <strong>👤 You</strong>

                    <br><br>

                    ${chat.message}

                </div>

                `;

            }

            else{

                chatBox.innerHTML += `

                <div class="ai-message">

                    <strong>🤖 AI Tutor</strong>

                    <br><br>

                    ${window.marked ? marked.parse(chat.message) : chat.message}

                </div>

                `;

            }

        });

        chatBox.scrollTop = chatBox.scrollHeight;

    }

    catch(error){

        console.error(error);

    }

}

loadHistory();

document.getElementById("message").addEventListener("keypress",function(e){

    if(e.key==="Enter"){

        sendMessage();

    }

});
document.querySelectorAll(".suggestion").forEach(btn=>{

    btn.addEventListener("click",function(){

        document.getElementById("message").value=this.innerText;

        sendMessage();

    });

});
async function sendMessage(){

    const input=document.getElementById("message");
    const sendBtn=document.getElementById("sendBtn");

    const text=input.value.trim();

    if(!text) return;

    const box=document.getElementById("chatBox");
    const time = new Date().toLocaleTimeString([],{

    hour:"2-digit",

    minute:"2-digit"

});

    box.innerHTML += `

<div class="user-message">

    <strong>👤 You</strong>

    <br><br>

    ${text}

    <div class="text-muted small mt-2">

        ${time}

    </div>

</div>

`;

    input.value="";
    input.focus();
    sendBtn.disabled = true;

    sendBtn.innerHTML = "Sending...";

    box.scrollTop=box.scrollHeight;


   box.innerHTML += `

<div
id="typing"
class="ai-message">

<div class="d-flex align-items-center">

<div class="spinner-border spinner-border-sm text-primary me-2"></div>

<strong>🤖 AI Tutor</strong>

</div>

<div class="mt-2">

Thinking...

</div>

</div>

`;

    box.scrollTop=box.scrollHeight;


    try{

        const response=await fetch("/api/ai-chat/",{

            method:"POST",

            headers:{

                "Content-Type":"application/json",

                "X-CSRFToken":"{{ csrf_token }}"

            },

            body:JSON.stringify({

                question:text

            })

        });

        const typing=document.getElementById("typing");

        if(typing){

            typing.remove();

        }

        const data=await response.json();

        if(!response.ok){

    sendBtn.disabled = false;
    sendBtn.innerHTML = "Send";
    input.focus();

    alert(data.message || JSON.stringify(data));

    return;

}

       box.innerHTML += `

<div class="ai-message">

    <div class="d-flex justify-content-between align-items-center">

        <strong>

            🤖 AI Tutor

        </strong>

        <button
            class="btn btn-sm btn-light"
            onclick="copyText(this)">

            Copy

        </button>

    </div>

    <hr>

   <div class="message-content">

   ${marked.parse(data.answer || data.response)}

</div>

<div class="text-muted small mt-2">

    ${time}

</div>

</div>

`;

if(window.hljs){

    document.querySelectorAll("pre code").forEach((block)=>{

        hljs.highlightElement(block);

    });

}


sendBtn.disabled = false;

sendBtn.innerHTML = "Send";

input.focus();

        box.scrollTop=box.scrollHeight;


    }

   catch(error){

    const typing = document.getElementById("typing");

    if(typing){
        typing.remove();
    }

    sendBtn.disabled = false;
    sendBtn.innerHTML = "Send";
    input.focus();

    console.error(error);

    alert("Unable to connect to server.");

}
}
/*==================================
      Copy AI Response
===================================*/

function copyText(button){

    const text =

    button.parentElement.nextElementSibling.innerText;

    navigator.clipboard.writeText(text);

    button.innerHTML = "Copied!";

    button.classList.remove("btn-light");

    button.classList.add("btn-success");

    setTimeout(()=>{

        button.innerHTML = "Copy";

        button.classList.remove("btn-success");

        button.classList.add("btn-light");

    },1500);

}
    /*==================================
        Clear Chat
===================================*/

function clearChat(){

    if(confirm("Are you sure you want to clear the chat?")){

        document.getElementById("chatBox").innerHTML="";

    }

}

</script>


<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

{% endblock %}
